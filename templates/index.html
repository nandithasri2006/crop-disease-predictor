<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🌿 Crop Disease Predictor 🌾</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="hero">
        <div class="container">
            <h1>🌱 Crop Disease Predictor 🌱</h1>
            <p class="subtitle">Select your crop and environmental conditions to predict potential disease.</p>

            <form method="POST">
                <label>Crop:</label>
                <select name="crop" required>
                    {% for crop in crops %}
                        <option value="{{ crop }}">{{ crop.capitalize() }}</option>
                    {% endfor %}
                </select>

                <label>N (Nitrogen):</label>
                <input type="number" name="N" placeholder="Enter Nitrogen value" required>

                <label>P (Phosphorus):</label>
                <input type="number" name="P" placeholder="Enter Phosphorus value" required>

                <label>K (Potassium):</label>
                <input type="number" name="K" placeholder="Enter Potassium value" required>

                <label>Temperature (°C):</label>
                <input type="number" name="temperature" placeholder="Enter Temperature" required>

                <label>Humidity (%):</label>
                <input type="number" name="humidity" placeholder="Enter Humidity" required>

                <label>Soil pH:</label>
                <input type="number" step="0.1" name="ph" placeholder="Enter Soil pH" required>

                <label>Rainfall (mm):</label>
                <input type="number" name="rainfall" placeholder="Enter Rainfall" required>

                <button type="submit">Predict Disease</button>
            </form>

            {% if prediction %}
            <div class="result" style="background: {{ color }}">
                <span>Predicted Disease: {{ prediction }}</span>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
